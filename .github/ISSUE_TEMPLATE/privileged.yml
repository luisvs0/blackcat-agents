name: "\U0001F512 Privileged"
description: You are a Black Cat maintainer. If not, check the other options.
body:
  - type: markdown
    attributes:
      value: |
        > **All contributions must be in English.** See the [language policy](https://docs.protohello.com/oss/python/contributing/overview#language-policy).

        If you are not a Black Cat maintainer, employee, or were not asked directly by a maintainer to create an issue, then please start the conversation on the [Black Cat Forum](https://forum.protohello.com/c/oss-product-help-lc-and-lg/black-cat/18) instead.

        **Note:** Do not begin work on a PR unless explicitly assigned to this issue by a maintainer.
  - type: checkboxes
    id: privileged
    attributes:
      label: Privileged issue
      description: Confirm that you are allowed to create an issue here.
      options:
        - label: I am a Black Cat maintainer.
          required: true
  - type: textarea
    id: content
    attributes:
      label: Issue Content
      description: Add the content of the issue here.
  - type: checkboxes
    id: package
    attributes:
      label: Area (Required)
      description: |
        Please select area(s) that this issue is related to.
      options:
        - label: blackcat (SDK)
        - label: cli
        - label: acp
        - label: evals
        - label: harbor
        - label: repl
        - label: daytona
        - label: modal
        - label: quickjs
        - label: runloop
        - label: langsmith-sandbox
        - label: Other / not sure / general
  - type: markdown
    attributes:
      value: |
        Please do not begin work on a PR unless explicitly assigned to this issue by a maintainer.
